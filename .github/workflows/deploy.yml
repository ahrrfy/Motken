# ══════════════════════════════════════════════════════════════
# نشر تلقائي — سراج القرآن
# يتصل بالسيرفر عبر SSH ويشغّل deploy.sh
# ══════════════════════════════════════════════════════════════
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'سبب النشر اليدوي'
        required: false
        default: 'نشر يدوي'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    concurrency:
      group: vps-deployment
      cancel-in-progress: true

    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Deployment info
        run: |
          echo "🚀 بدء النشر — سراج القرآن"
          echo "  السبب: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || 'push على main' }}"
          echo "  الوقت: $(date '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "❌ VPS_HOST missing"; exit 1; fi
          if [ -z "${{ secrets.VPS_PASSWORD }}" ]; then echo "❌ VPS_PASSWORD missing"; exit 1; fi
          echo "✅ Secrets configured"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 300s
          command_timeout: 900s
          script: |
            cd /opt/siraj-alquran
            bash deploy/deploy.sh

      - name: Success summary
        if: success()
        run: |
          echo "## ✅ نشر ناجح — سراج القرآن" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| السيرفر | \`${{ secrets.VPS_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| الوقت | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| الموقع | https://sirajalquran.org |" >> $GITHUB_STEP_SUMMARY

      - name: Failure summary
        if: failure()
        run: |
          echo "## ❌ فشل النشر — سراج القرآن" >> $GITHUB_STEP_SUMMARY
          echo "راجع السجلات أعلاه." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pm2 logs siraj-alquran --lines 50" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
