name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # --- CI Gate: Type check + Build ---
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # --- Build Docker Image & Push to GHCR ---
  build-and-push:
    name: Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Deploy to VPS via SSH ---
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/siraj-alquran

            echo "=== Deploying Siraj Al-Quran ==="

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Save current image for rollback
            PREV_IMAGE=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml images app -q 2>/dev/null || echo "none")
            echo "Previous image: $PREV_IMAGE"

            # Pull new image
            echo "Pulling new image..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app

            # Deploy
            echo "Starting new container..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps app

            # Health check with retry (5 attempts, 10s apart)
            echo "Running health checks..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 10
              if curl -sf http://localhost:5002/_health > /dev/null 2>&1; then
                HEALTHY=true
                echo "Health check $i: OK"
                break
              fi
              echo "Health check $i: FAILED, retrying..."
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "=== DEPLOY FAILED — Rolling back ==="
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs app --tail 50
              if [ "$PREV_IMAGE" != "none" ]; then
                docker compose -f docker-compose.yml -f docker-compose.prod.yml down app
                docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d app
              fi
              exit 1
            fi

            # Cleanup old images
            docker image prune -f

            echo "=== Deploy successful! ==="
            echo "App is live at https://sirajalquran.org"
