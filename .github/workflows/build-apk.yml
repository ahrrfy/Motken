name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'client/**'
      - 'shared/**'
      - 'capacitor.config.ts'

  workflow_dispatch:

concurrency:
  group: android-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npx vite build --mode production

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/siraj-release.keystore
          echo "Keystore decoded successfully"

      - name: Get version info
        id: version
        run: |
          VERSION_NAME="$(date +'%Y.%m.%d').${{ github.run_number }}"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: ${{ github.run_number }})"

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          APK_DST="android/app/build/outputs/apk/release/siraj-alquran-${{ steps.version.outputs.tag }}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          echo "APK size: $(du -h "$APK_SRC" | cut -f1)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: siraj-alquran-${{ steps.version.outputs.tag }}
          path: android/app/build/outputs/apk/release/siraj-alquran-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "سِرَاجُ الْقُرْآنِ — ${{ steps.version.outputs.version_name }}"
          body: |
            ## سِرَاجُ الْقُرْآنِ — تطبيق أندرويد

            **الإصدار**: `${{ steps.version.outputs.version_name }}`

            ### التثبيت:
            1. حمّل ملف APK أدناه
            2. افتح الملف على هاتفك
            3. اسمح بالتثبيت من مصادر غير معروفة إذا طُلب
            4. افتح التطبيق واستمتع!

            ### ملاحظات:
            - التطبيق يتصل بـ https://sirajalquran.org
            - التحديثات تتم تلقائياً بدون الحاجة لتحميل APK جديد
            - يتطلب اتصال بالإنترنت

          files: android/app/build/outputs/apk/release/siraj-alquran-*.apk
          generate_release_notes: true

      - name: Cleanup Keystore
        if: always()
        run: rm -f android/siraj-release.keystore

      - name: Build Summary
        if: always()
        run: |
          APK_FILE="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_FILE" ]; then
            APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
            echo "## ✅ بناء APK ناجح" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| المعلومة | القيمة |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| الإصدار | \`${{ steps.version.outputs.version_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| رمز الإصدار | \`${{ steps.version.outputs.version_code }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| حجم APK | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| التاغ | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ فشل بناء APK" >> $GITHUB_STEP_SUMMARY
          fi
