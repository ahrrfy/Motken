# إعداد Nginx كـ Reverse Proxy لنظام سراج القرآن
# ضع هذا الملف في /etc/nginx/sites-available/siraj-alquran
# ثم: ln -s /etc/nginx/sites-available/siraj-alquran /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name sirajalquran.org www.sirajalquran.org;

    # إعادة توجيه HTTP إلى HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sirajalquran.org www.sirajalquran.org;

    # SSL من Let's Encrypt (مجاني)
    # شغّل: certbot --nginx -d sirajalquran.org -d www.sirajalquran.org
    ssl_certificate /etc/letsencrypt/live/sirajalquran.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sirajalquran.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # حد أقصى لحجم الملفات المرفوعة (تسجيلات صوتية)
    client_max_body_size 50M;

    # ضغط gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # كاش للملفات الثابتة
    location /assets/ {
        proxy_pass http://127.0.0.1:5002;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API و صفحات الويب
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
